<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wallet Cluster Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <style>
      :root {
        --bg: #0c0f14;
        --panel: #141a22;
        --border: #243044;
        --text: #e8edf4;
        --muted: #8b9bb5;
        --accent: #3b82f6;
        --risk-high: #f87171;
        --risk-mid: #fbbf24;
        --risk-low: #34d399;
        --font: "Segoe UI", system-ui, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        min-height: 100%;
        max-height: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      header {
        flex-shrink: 0;
        padding: 1rem 1.25rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.75rem;
      }
      header h1 {
        margin: 0;
        font-size: 1.15rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
        flex: 1;
      }
      .toolbar input[type="text"] {
        min-width: 280px;
        flex: 1;
        max-width: 420px;
        padding: 0.5rem 0.65rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #0e131b;
        color: var(--text);
      }
      .toolbar select,
      .toolbar button {
        padding: 0.5rem 0.75rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
      }
      .toolbar button.primary {
        background: var(--accent);
        border-color: #2563eb;
        font-weight: 600;
      }
      .toolbar button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      /* Analyze stays readable while streaming; double-run blocked in JS */
      .toolbar button.primary.analyze-busy {
        opacity: 1;
        cursor: wait;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
      }
      .toolbar button.primary.analyze-busy::after {
        content: "";
        display: inline-block;
        width: 0.65rem;
        height: 0.65rem;
        margin-left: 0.45rem;
        vertical-align: -0.08em;
        border: 2px solid rgba(255, 255, 255, 0.35);
        border-top-color: #fff;
        border-radius: 50%;
        animation: analyze-spin 0.7s linear infinite;
      }
      @keyframes analyze-spin {
        to {
          transform: rotate(360deg);
        }
      }
      main {
        flex: 1;
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(280px, 340px) 1fr;
        grid-template-rows: minmax(0, 1fr);
        overflow: hidden;
      }
      @media (max-width: 900px) {
        main {
          grid-template-columns: 1fr;
          grid-template-rows: auto minmax(0, 1fr);
        }
      }
      #panel-host {
        position: relative;
        z-index: 5;
        min-height: 0;
        border-right: 1px solid var(--border);
        overflow: auto;
        background: var(--panel);
      }
      #graph-host {
        position: relative;
        z-index: 1;
        isolation: isolate;
        min-height: 0;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
      }
      #graph-host svg {
        width: 100%;
        height: 100%;
        max-height: 100%;
        display: block;
      }
      .hint {
        flex-shrink: 0;
        color: var(--muted);
        font-size: 0.85rem;
        padding: 0.35rem 1.25rem 0.5rem;
        margin: 0;
      }
      #sync-banner {
        flex-shrink: 0;
        font-size: 0.82rem;
        padding: 0.4rem 1.25rem;
        background: #0e131b;
        border-bottom: 1px solid var(--border);
        color: var(--muted);
        min-height: 1.75rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      #sync-banner[hidden] {
        display: none !important;
      }
      #sync-banner.working {
        color: var(--text);
      }
      #sync-banner.done {
        color: var(--risk-low);
        background: rgba(52, 211, 153, 0.08);
      }
      #sync-banner.err {
        color: var(--risk-high);
        background: rgba(248, 113, 113, 0.08);
      }
      .panel-h2 {
        margin: 0 0 0.5rem;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 0.4rem;
        flex-wrap: wrap;
      }
      .panel-info {
        position: relative;
        display: inline-flex;
        align-items: center;
      }
      .panel-info-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 15px;
        height: 15px;
        border-radius: 50%;
        font-size: 0.62rem;
        font-weight: 800;
        font-style: italic;
        font-family: Georgia, "Times New Roman", serif;
        line-height: 1;
        border: 1px solid var(--border);
        color: var(--muted);
        background: #0e131b;
        cursor: help;
        user-select: none;
        flex-shrink: 0;
      }
      .panel-info-btn:focus {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
        color: var(--text);
      }
      /* Source HTML for tooltips (shown via fixed portal in panel.js) */
      .panel-info-tip-src {
        display: none !important;
      }
      #panel-tooltip-portal {
        position: fixed;
        z-index: 2147483646;
        max-width: min(300px, calc(100vw - 20px));
        padding: 0.55rem 0.65rem;
        font-size: 0.72rem;
        font-weight: 400;
        line-height: 1.5;
        color: var(--text);
        background: #1a2332;
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.65);
        pointer-events: none;
      }
      #panel-tooltip-portal[hidden] {
        display: none !important;
      }
      #panel-tooltip-portal strong {
        font-weight: 600;
        color: var(--text);
      }
      #panel-tooltip-portal em {
        font-style: italic;
        color: var(--muted);
      }
      #graph-node-popup-backdrop {
        position: fixed;
        inset: 0;
        z-index: 80;
        background: rgba(0, 0, 0, 0.45);
        display: none;
      }
      #graph-node-popup-backdrop.is-open {
        display: block;
      }
      #graph-node-popup {
        position: fixed;
        z-index: 81;
        min-width: 220px;
        max-width: min(320px, calc(100vw - 24px));
        padding: 0.85rem 1rem;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.55);
        display: none;
      }
      #graph-node-popup.is-open {
        display: block;
      }
      #graph-node-popup .gnp-title {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin: 0 0 0.35rem;
      }
      #graph-node-popup .gnp-addr {
        font-family: ui-monospace, monospace;
        font-size: 0.78rem;
        word-break: break-all;
        margin: 0 0 0.85rem;
        color: var(--text);
      }
      #graph-node-popup .gnp-actions {
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
      }
      #graph-node-popup .gnp-actions button {
        padding: 0.45rem 0.65rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #0e131b;
        color: var(--text);
        font-size: 0.88rem;
        cursor: pointer;
        text-align: center;
      }
      #graph-node-popup .gnp-actions button:hover {
        border-color: var(--accent);
      }
      #graph-node-popup .gnp-actions button.primary {
        background: var(--accent);
        border-color: #2563eb;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Wallet cluster analyzer</h1>
      <div class="toolbar">
        <input
          type="text"
          id="addr-input"
          placeholder="0x… seed address"
          spellcheck="false"
          autocomplete="off"
        />
        <select id="depth-select" title="Expansion depth">
          <option value="0">Depth 0 (seed only)</option>
          <option value="1" selected>Depth 1 (+ neighbors)</option>
          <option value="2">Depth 2 (more neighbors)</option>
        </select>
        <button type="button" class="primary" id="analyze-btn">Analyze</button>
      </div>
    </header>
    <div id="sync-banner" hidden></div>
    <p class="hint">
      Live UI uses <code>POST /analyze/stream</code> (snapshots as each wallet
      loads; banner confirms when sync finishes). JSON cache under
      <code>cache/</code> · Set <code>ETHERSCAN_API_KEY</code> in
      <code>.env</code>.
    </p>
    <main>
      <div id="panel-host"></div>
      <div id="graph-host"></div>
    </main>
    <div id="panel-tooltip-portal" hidden role="tooltip"></div>
    <div id="graph-node-popup-backdrop" aria-hidden="true"></div>
    <div
      id="graph-node-popup"
      role="dialog"
      aria-modal="true"
      aria-labelledby="graph-node-popup-title"
    >
      <p id="graph-node-popup-title" class="gnp-title">Wallet</p>
      <p class="gnp-addr" id="graph-node-popup-addr"></p>
      <div class="gnp-actions">
        <button type="button" class="primary" id="graph-node-popup-analyze">
          Analyze (depth 1)
        </button>
        <button type="button" id="graph-node-popup-etherscan">
          View on block explorer
        </button>
      </div>
    </div>
    <script src="/static/panel.js"></script>
    <script src="/static/graph.js"></script>
    <script>
      (function () {
        const input = document.getElementById("addr-input");
        const depth = document.getElementById("depth-select");
        const btn = document.getElementById("analyze-btn");
        const syncBanner = document.getElementById("sync-banner");
        let syncDoneTimer = null;
        let analyzeInFlight = false;

        function clearSyncDoneTimer() {
          if (syncDoneTimer) {
            clearTimeout(syncDoneTimer);
            syncDoneTimer = null;
          }
        }

        function updateSyncBanner(sync, className) {
          if (!syncBanner) return;
          clearSyncDoneTimer();
          if (!sync || !sync.message) {
            syncBanner.hidden = true;
            syncBanner.textContent = "";
            syncBanner.className = "";
            return;
          }
          syncBanner.hidden = false;
          syncBanner.className = className || "working";
          let text = sync.message;
          if (
            sync.phase === "syncing" &&
            sync.step === "neighbor" &&
            sync.index != null &&
            sync.total != null
          ) {
            text = `${sync.message} (${sync.index}/${sync.total})`;
          }
          syncBanner.textContent = text;
        }

        /** Set from analyze snapshots so the graph can build explorer links. */
        window.__clusterAnalyzerChainId = 1;

        async function run() {
          if (analyzeInFlight) return;
          const addr = (input.value || "").trim();
          if (!/^0x[a-fA-F0-9]{40}$/.test(addr)) {
            updateSyncBanner(null);
            window.renderPanel({
              error: "Enter a valid 0x-prefixed 20-byte address.",
            });
            return;
          }
          analyzeInFlight = true;
          btn.classList.add("analyze-busy");
          btn.setAttribute("aria-busy", "true");
          updateSyncBanner({
            phase: "started",
            message: "Connecting…",
          });
          window.renderPanel({ loading: true });
          try {
            const res = await fetch("/analyze/stream", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Accept: "text/event-stream",
              },
              body: JSON.stringify({
                address: addr,
                depth: parseInt(depth.value, 10),
                force_refresh: false,
              }),
            });
            if (!res.ok) {
              const errBody = await res.json().catch(() => ({}));
              updateSyncBanner(
                {
                  message: errBody.detail || res.statusText || "Request failed",
                },
                "err"
              );
              window.renderPanel({
                error: errBody.detail || res.statusText || "Request failed",
              });
              return;
            }
            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";
            let lastData = null;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              buffer += decoder.decode(value, { stream: true });
              let sep;
              while ((sep = buffer.indexOf("\n\n")) >= 0) {
                const block = buffer.slice(0, sep);
                buffer = buffer.slice(sep + 2);
                const dataLine = block
                  .split("\n")
                  .find((ln) => ln.startsWith("data: "));
                if (!dataLine) continue;
                let payload;
                try {
                  payload = JSON.parse(dataLine.slice(6).trim());
                } catch {
                  continue;
                }
                if (payload.event === "error") {
                  updateSyncBanner(
                    { message: String(payload.detail || "Error") },
                    "err"
                  );
                  window.renderPanel({
                    error: String(payload.detail || "Error"),
                  });
                  return;
                }
                if (payload.event === "status" && payload.sync) {
                  updateSyncBanner(payload.sync, "working");
                }
                if (payload.event === "snapshot" && payload.data) {
                  lastData = payload.data;
                  if (payload.data.chain_id != null) {
                    window.__clusterAnalyzerChainId = Number(payload.data.chain_id);
                  }
                  const d = payload.data.depth;
                  if (d === 0 || d === 1 || d === 2) {
                    depth.value = String(d);
                  }
                  if (payload.sync) {
                    updateSyncBanner(payload.sync, "working");
                  }
                  window.renderPanel(payload.data);
                  window.renderGraph(payload.data.graph || {});
                }
                if (payload.event === "done") {
                  updateSyncBanner(
                    {
                      phase: "complete",
                      message: String(
                        payload.message || "Sync complete."
                      ),
                    },
                    "done"
                  );
                  syncDoneTimer = setTimeout(() => {
                    if (lastData) {
                      updateSyncBanner({
                        phase: "idle",
                        message: "Ready — expand again to refresh from chain.",
                      });
                      syncBanner.className = "working";
                    } else {
                      updateSyncBanner(null);
                    }
                    syncDoneTimer = null;
                  }, 8000);
                }
              }
            }
            if (!lastData) {
              window.renderPanel({
                error: "Stream ended without data.",
              });
            }
          } catch (e) {
            updateSyncBanner({ message: String(e) }, "err");
            window.renderPanel({ error: String(e) });
          } finally {
            analyzeInFlight = false;
            btn.classList.remove("analyze-busy");
            btn.removeAttribute("aria-busy");
          }
        }
        btn.addEventListener("click", run);
        input.addEventListener("keydown", (ev) => {
          if (ev.key === "Enter") run();
        });

        function applyQueryStringAnalyze() {
          const params = new URLSearchParams(window.location.search);
          const addr = (params.get("address") || "").trim();
          if (!/^0x[a-fA-F0-9]{40}$/.test(addr)) return;
          input.value = addr;
          const d = params.get("depth");
          if (d === "0" || d === "1" || d === "2") {
            depth.value = d;
          }
          if (params.get("auto") === "1") {
            run();
          }
        }
        applyQueryStringAnalyze();
      })();
    </script>
  </body>
</html>
